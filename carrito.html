<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/main.css">

</head>
<body>
    
    <div class="wrapper">

        <aside>
           
            <header>
                <h1 class="logo">CarpiShop</h1>
            </header>

            <nav>
                <ul>
                    <li>
                        <a class="boton-menu boton-volver" href="/index.html"><i class="bi bi-arrow-return-left"></i>Seguir comprando</button>
                    </li>
                  
                    <li>
                        <a class="boton-menu boton-carrito active" href="/carrito.html"><i class="bi bi-cart-fill"></i>Carrito </a><span class="numerito">0</span>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="texto-footer">© 2026 Carpi Coder</p>
            </footer>
        </aside>

        <main>
            <h2 class="titulo-principla">Carrito</h2>
            <div class="contenedor-carrito">

                <p class="carrito-vacio">tu carrito esta vacio. <i class="bi bi-emoji-frown"></i></p>

                <div class="carrito-productos">

                    <div class="carrito-producto">
                        <img src="img/coats/01.jpg" alt="">
                        <div class="carrito-producto-titulo">
                            <small>titulo</small>
                            <h3>abrigo 01</h3>
                        </div>
                        <div class="carrito-producto-cantidad">
                            <small>Cantidad</small>
                            <p>1</p>
                        </div>
                        <div class="carrito-producto-precio">
                            <small>precio</small>
                            <p>$1000</p>
                        </div>
                        <div class="carrito-producto-subtotal">
                            <small>subtotal</small>
                            <p>$1000</p>
                        </div>
                        <button class="carrito-producto-eliminar"><i class="bi bi-trash-fill"></i></button>
                    </div>

                    <div class="carrito-producto">
                        <img src="img/coats/02.jpg" alt="">
                        <div class="carrito-producto-titulo">
                            <small>titulo</small>
                            <h3>abrigo 02</h3>
                        </div>
                        <div class="carrito-producto-cantidad">
                            <small>Cantidad</small>
                            <p>2</p>
                        </div>
                        <div class="carrito-producto-precio">
                            <small>precio</small>
                            <p>$1000</p>
                        </div>
                        <div class="carrito-producto-subtotal">
                            <small>subtotal</small>
                            <p>$2000</p>
                        </div>
                        <button class="carrito-producto-eliminar"><i class="bi bi-trash-fill"></i></button>
                    </div>

                </div>

                <div class="carrito-acciones">
                    <div class="carrito-acciones-izquierda">
                        <button class="carrito-acciones-vaciar">Vaciar carrito</button>
                    </div>
                    <div class="carrito-acciones-derecha">
                        <div class="carrito-acciones-total">
                            <p>Total:</p>
                            <p id="total">$3000</p>
                        </div>
                        <button class="carrito-acciones-comprar">Comprar ahora</button>
                    </div>
                </div>

            </div>
               
        </main>

    </div>
    
    <script src="js/carrito.js"></script>

</body>
</html>
